name: KRATOS CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "docs/**", "test/**", "ci/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Type check
        run: bunx tsc --noEmit

      - name: Test (stores + contracts)
        run: bun test tests/

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: E2E tests
        run: bun run test:e2e
        env:
          PLAYWRIGHT_AUTO_DEV: "1"

    # No deploy step — deploy requires explicit Lucas authorization
    # No secrets used in this workflow — GITHUB_TOKEN / OMNIS_BASE_URL are Worker secrets
