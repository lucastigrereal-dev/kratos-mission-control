name: KRATOS CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "docs/**", "test/**", "ci/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test (stores + contracts)
        run: bun test tests/

    # No deploy step — deploy requires explicit Lucas authorization
    # No secrets used in this workflow — GITHUB_TOKEN / OMNIS_BASE_URL are Worker secrets
