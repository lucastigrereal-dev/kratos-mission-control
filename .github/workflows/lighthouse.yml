name: Lighthouse CI

# Requires VERCEL_TOKEN secret and @lhci/cli to be configured.
# On PRs targeting main: run Lighthouse against Vercel preview URL and post
# results as PR comment. Blocks merge if any score < budget thresholds.
#
# Setup: add VERCEL_TOKEN to repo secrets and configure vercel project link.
# Reference: https://lhci.netlify.app/docs/getting-started/

on:
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # ── Wait for Vercel Preview deployment ──────────────────────────────────
      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel-preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
        continue-on-error: true  # Don't fail if no Vercel deploy configured

      # ── Run Lighthouse ──────────────────────────────────────────────────────
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse (3 runs, median)
        run: |
          PREVIEW_URL="${{ steps.vercel-preview.outputs.url }}"
          if [ -z "$PREVIEW_URL" ]; then
            echo "No Vercel preview URL available — skipping Lighthouse audit"
            exit 0
          fi
          lhci autorun \
            --collect.url="$PREVIEW_URL/agora" \
            --collect.url="$PREVIEW_URL/sistema" \
            --collect.numberOfRuns=3 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance.minScore=0.90 \
            --assert.assertions.categories:accessibility.minScore=0.95 \
            --assert.assertions.categories:best-practices.minScore=0.95 \
            --assert.assertions.categories:seo.minScore=0.90
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
